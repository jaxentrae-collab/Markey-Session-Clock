
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Session Clock</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  padding:20px;
  border-radius:12px;
  background:#222;
  text-align:center;
  width:320px;
}
.time{font-size:2rem;font-weight:bold;}
.session{font-size:1.2rem;margin-top:10px;}
</style>
</head>
<body>
<div class="card">
  <h2>Market Session Clock</h2>
  <div class="time" id="time"></div>
  <div class="session" id="session"></div>
</div>

<script>
function updateClock(){
  const now = new Date();
  const pst = new Date(now.toLocaleString("en-US",{timeZone:"America/Los_Angeles"}));
  const h = pst.getHours();
  const m = pst.getMinutes().toString().padStart(2,"0");

  document.getElementById("time").textContent = `${h}:${m} PST`;

  let session = "Market Closed";
  if(h >= 17 || h < 2) session = "Sydney Session";
  else if(h >= 0 && h < 9) session = "Tokyo Session";
  else if(h >= 2 && h < 11) session = "London Session";
  else if(h >= 5 && h < 14) session = "New York Session";

  document.getElementById("session").textContent = session;
}
setInterval(updateClock,1000);
updateClock();
</script>
</body>
</html>
